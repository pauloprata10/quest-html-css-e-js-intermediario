<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quest HTML CSS e JS - Intermediário</title>
    <link rel="stylesheet" href="src/css/style.css" />
    <link rel="stylesheet" href="src/css/reset.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet"/>
  </head>
  <body>
    <main>
      <section class="texto">
        <h1>
          Ficou com dúvida?<br />
          Nos mande uma mensagem!
        </h1>

        <p>
          caso tenha ficado com qualquer dúvida<br />
          basta nos mandar uma mensagem e<br />
          entraremos em contato em menos de 24h.
        </p>
      </section>

      <section class="formulario">
        <div class="caixa-formulario">
          <input
            type="text"
            name="nome-completo"
            id="dadoUsuario"
            placeholder="Nome completo *"
          />

          <p class="mensagem-erro ocultar">campo obrigatório</p>

          <input
            type="email"
            name="email"
            id="dadoUsuario"
            placeholder="Email *"
          />

          <p class="mensagem-erro ocultar">campo obrigatório</p>

          <input
            type="tel"
            name="telefone"
            id="dadoUsuario"
            placeholder="Telefone *"
          />

          <p class="mensagem-erro ocultar">campo obrigatório</p>

          <textarea
            name="mensagem"
            id="dadoUsuario"
            cols="30"
            rows="10"
            placeholder="Mensagem *"
          ></textarea>
          <p class="mensagem-erro ocultar">campo obrigatório</p>

          <h2>*campos obrigatórios</h2>

          <input type="button" value="Enviar" id="enviarFormulario" />
        </div>
      </section>
    </main>

    <script src="src/js/formulario.js"></script>
  </body>
</html>
